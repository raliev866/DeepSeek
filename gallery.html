<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ГАЛЕРЕЯ - Статический просмотрщик файлов</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* Шапка */
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 {
            font-size: 2em;
            background: linear-gradient(135deg, #fff, #4cc9f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header .path {
            color: #4cc9f0;
            font-size: 0.9em;
            word-break: break-all;
            margin-bottom: 15px;
        }
        .stats {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .stat {
            background: rgba(255,255,255,0.05);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        .stat-value {
            font-weight: bold;
            color: #4cc9f0;
        }
        
        /* Поиск и фильтры */
        .controls {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .search-box {
            width: 100%;
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 1em;
            margin-bottom: 15px;
        }
        .search-box:focus {
            outline: none;
            border-color: #4cc9f0;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 8px 16px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: #4cc9f0;
            color: #1a1a2e;
        }
        .filter-btn:hover {
            background: rgba(76,201,240,0.5);
        }
        
        /* Сетка файлов */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        /* Карточка файла */
        .file-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
        }
        .file-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.15);
            border-color: #4cc9f0;
        }
        
        /* Превью */
        .file-preview {
            height: 180px;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .preview-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-icon {
            font-size: 64px;
        }
        .preview-text {
            padding: 15px;
            font-size: 12px;
            font-family: monospace;
            color: rgba(255,255,255,0.7);
            background: rgba(0,0,0,0.3);
            height: 180px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-word;
        }
        
        /* Информация о файле */
        .file-info {
            padding: 15px;
        }
        .file-name {
            font-weight: bold;
            font-size: 1em;
            margin-bottom: 5px;
            word-break: break-word;
        }
        .file-meta {
            font-size: 0.8em;
            color: rgba(255,255,255,0.5);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .file-size {
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 12px;
        }
        .file-date {
            background: rgba(255,255,255,0.1);
            padding: 2px 8px;
            border-radius: 12px;
        }
        
        /* Пустое состояние */
        .empty-state {
            text-align: center;
            padding: 60px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            background: #1a1a2e;
            border-radius: 20px;
            overflow: auto;
            padding: 20px;
        }
        .modal-close {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }
        .modal-image {
            max-width: 100%;
            max-height: 80vh;
            object-fit: contain;
        }
        .modal-text {
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 80vh;
            overflow-y: auto;
            padding: 20px;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.8em;
            padding: 20px;
        }
        
        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.5em; }
            .file-preview { height: 150px; }
            .preview-text { height: 150px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🖼️ СТАТИЧЕСКАЯ ГАЛЕРЕЯ</h1>
            <div class="path">📁 <span id="currentPath"></span></div>
            <div class="stats" id="stats"></div>
        </div>
        
        <div class="controls">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск файлов...">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">📁 Все</button>
                <button class="filter-btn" data-filter="image">🖼️ Изображения</button>
                <button class="filter-btn" data-filter="text">📄 Текст/Код</button>
                <button class="filter-btn" data-filter="other">📦 Прочее</button>
            </div>
        </div>
        
        <div class="gallery-grid" id="galleryGrid"></div>
        
        <div class="footer">
            <span>⚡ Сгенерировано в Termux</span>
            <span>📅 <span id="generationDate"></span></span>
        </div>
    </div>
    
    <div class="modal" id="fileModal">
        <div class="modal-close" onclick="closeModal()">&times;</div>
        <div class="modal-content" id="modalContent"></div>
    </div>
    
    <script>
const filesData = [
    {
        "name": "index.html",
        "ext": "html",
        "size": "86 КБ",
        "date": "25.03.2026 12:43",
        "icon": "🌐",
        "color": "#ff6b6b",
        "thumbnail": "",
        "preview": "&lt;!DOCTYPE html&gt;"
    }
,
    {
        "name": "navi.html",
        "ext": "html",
        "size": "9 КБ",
        "date": "23.03.2026 23:06",
        "icon": "🌐",
        "color": "#ff6b6b",
        "thumbnail": "",
        "preview": "&lt;!DOCTYPE html&gt;"
    }

];
        
        let currentFilter = 'all';
        let searchTerm = '';
        
        function updateStats() {
            const statsDiv = document.getElementById('stats');
            const total = filesData.length;
            const images = filesData.filter(f => ['jpg','jpeg','png','gif','webp','bmp'].includes(f.ext)).length;
            const texts = filesData.filter(f => ['md','txt','sh','py','js','css','html','json','xml'].includes(f.ext)).length;
            const others = total - images - texts;
            statsDiv.innerHTML = `
                <div class="stat">📁 Всего: <span class="stat-value">${total}</span></div>
                <div class="stat">🖼️ Изображения: <span class="stat-value">${images}</span></div>
                <div class="stat">📄 Текст/Код: <span class="stat-value">${texts}</span></div>
                <div class="stat">📦 Прочее: <span class="stat-value">${others}</span></div>
            `;
        }
        
        function isImage(ext) {
            return ['jpg','jpeg','png','gif','webp','bmp'].includes(ext);
        }
        
        function isText(ext) {
            return ['md','txt','sh','py','js','css','html','json','xml'].includes(ext);
        }
        
        function renderGallery() {
            const grid = document.getElementById('galleryGrid');
            let filtered = filesData;
            
            // Фильтр по типу
            if (currentFilter === 'image') {
                filtered = filtered.filter(f => isImage(f.ext));
            } else if (currentFilter === 'text') {
                filtered = filtered.filter(f => isText(f.ext));
            } else if (currentFilter === 'other') {
                filtered = filtered.filter(f => !isImage(f.ext) && !isText(f.ext));
            }
            
            // Поиск
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = filtered.filter(f => f.name.toLowerCase().includes(term));
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🔍</div>
                        <div>Ничего не найдено</div>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = filtered.map(file => {
                let previewHtml = '';
                
                if (isImage(file.ext) && file.thumbnail) {
                    previewHtml = `<img class="preview-image" src="${file.thumbnail}" alt="${file.name}" onclick="openFile('${file.name}', '${file.ext}')">`;
                } else if (isText(file.ext) && file.preview) {
                    previewHtml = `<div class="preview-text" onclick="openFile('${file.name}', '${file.ext}')">${file.preview}</div>`;
                } else {
                    previewHtml = `<div class="preview-icon" style="color: ${file.color}" onclick="openFile('${file.name}', '${file.ext}')">${file.icon}</div>`;
                }
                
                return `
                    <div class="file-card" onclick="openFile('${file.name}', '${file.ext}')">
                        <div class="file-preview">
                            ${previewHtml}
                        </div>
                        <div class="file-info">
                            <div class="file-name" style="color: ${file.color}">${file.icon} ${file.name}</div>
                            <div class="file-meta">
                                <span class="file-size">📦 ${file.size}</span>
                                <span class="file-date">📅 ${file.date}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function openFile(filename, ext) {
            // Создаем ссылку для скачивания/просмотра
            const url = `/storage/emulated/0/Documents/01_GitHub_DeepSeekProject/${encodeURIComponent(filename)}`;
            
            if (isImage(ext)) {
                // Открываем изображение в модальном окне
                const modal = document.getElementById('fileModal');
                const modalContent = document.getElementById('modalContent');
                modalContent.innerHTML = `<img class="modal-image" src="${url}" alt="${filename}">`;
                modal.style.display = 'flex';
            } else if (isText(ext)) {
                // Загружаем и показываем текст
                fetch(url)
                    .then(response => response.text())
                    .then(text => {
                        const modal = document.getElementById('fileModal');
                        const modalContent = document.getElementById('modalContent');
                        modalContent.innerHTML = `<pre class="modal-text">${escapeHtml(text)}</pre>`;
                        modal.style.display = 'flex';
                    })
                    .catch(() => {
                        window.open(url, '_blank');
                    });
            } else {
                // Скачиваем остальные файлы
                window.open(url, '_blank');
            }
        }
        
        function escapeHtml(text) {
            return text.replace(/&/g, '&amp;')
                       .replace(/</g, '&lt;')
                       .replace(/>/g, '&gt;')
                       .replace(/"/g, '&quot;')
                       .replace(/'/g, '&#39;');
        }
        
        function closeModal() {
            document.getElementById('fileModal').style.display = 'none';
            document.getElementById('modalContent').innerHTML = '';
        }
        
        function updateSearch() {
            searchTerm = document.getElementById('searchInput').value;
            renderGallery();
        }
        
        document.getElementById('searchInput').addEventListener('input', updateSearch);
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderGallery();
            });
        });
        
        document.getElementById('currentPath').textContent = '/storage/emulated/0/Documents/01_GitHub_DeepSeekProject';
        document.getElementById('generationDate').textContent = new Date().toLocaleString('ru-RU');
        
        updateStats();
        renderGallery();
        
        // Закрытие модального окна по ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
        
        // Закрытие по клику вне содержимого
        document.getElementById('fileModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('fileModal')) closeModal();
        });
    </script>
</body>
</html>
