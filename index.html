<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📚 НАВИГАТОР DeepSeek (RAW для ИИ)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }
        .title h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #fff, #4cc9f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .title .path {
            font-size: 0.9em;
            color: #4cc9f0;
            margin-top: 5px;
            word-break: break-all;
        }
        .stats {
            display: flex;
            gap: 15px;
        }
        .stat {
            background: rgba(255,255,255,0.1);
            padding: 12px 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #4cc9f0;
        }
        .stat-label {
            font-size: 0.8em;
            color: rgba(255,255,255,0.6);
        }
        .search-section {
            margin-bottom: 20px;
        }
        .search-box {
            width: 100%;
            padding: 14px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 1em;
            margin-bottom: 10px;
        }
        .search-box:focus {
            outline: none;
            border-color: #4cc9f0;
        }
        .search-buttons {
            display: flex;
            gap: 10px;
        }
        .btn {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }
        .btn-search {
            background: linear-gradient(135deg, #4cc9f0, #4895ef);
        }
        .btn-reset {
            background: linear-gradient(135deg, #ff6b6b, #ff8e8e);
        }
        .btn-up {
            background: linear-gradient(135deg, #6c5ce7, #8e7cf0);
        }
        .file-tree {
            background: rgba(0,0,0,0.3);
            border-radius: 16px;
            padding: 20px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
        }
        .tree-item {
            margin: 2px 0;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .tree-item-content {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            color: #fff;
        }
        .tree-item-content:hover {
            background: rgba(76,201,240,0.2);
        }
        .folder-icon { color: #ffd166; margin-right: 10px; font-size: 1.1em; }
        .file-icon { margin-right: 10px; font-size: 1.1em; }
        .md-icon { color: #6c5ce7; margin-right: 10px; }
        .html-icon { color: #ff6b6b; margin-right: 10px; }
        .docx-icon { color: #2ecc71; margin-right: 10px; }
        .script-icon { color: #f39c12; margin-right: 10px; }
        .file-size {
            color: rgba(255,255,255,0.5);
            font-size: 0.8em;
            margin-left: 10px;
        }
        .breadcrumb {
            margin-bottom: 20px;
            padding: 12px 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            word-break: break-all;
        }
        .breadcrumb a {
            color: #4cc9f0;
            text-decoration: none;
            cursor: pointer;
        }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb span { color: rgba(255,255,255,0.5); }
        .footer {
            margin-top: 30px;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.8em;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .badge {
            background: rgba(76,201,240,0.2);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid #4cc9f0;
            color: #4cc9f0;
        }
        .no-results {
            text-align: center;
            padding: 50px;
            color: rgba(255,255,255,0.5);
        }
        .loading-progress {
            text-align: center;
            padding: 30px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin: 15px 0;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4cc9f0, #a8dadc);
            width: 0%;
            transition: width 0.3s;
        }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            .title h1 { font-size: 1.5em; }
            .stat { padding: 8px 12px; }
            .stat-value { font-size: 1.2em; }
            .file-tree { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <h1>🧭 НАВИГАТОР DeepSeek</h1>
                <div class="path" id="currentPath">📁 Загрузка...</div>
            </div>
            <div class="stats" id="stats">
                <div class="stat"><div class="stat-value" id="folderCount">0</div><div class="stat-label">Папок</div></div>
                <div class="stat"><div class="stat-value" id="fileCount">0</div><div class="stat-label">Файлов</div></div>
                <div class="stat"><div class="stat-value" id="totalSize">0</div><div class="stat-label">Размер</div></div>
            </div>
        </div>
        
        <div class="search-section">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск файлов и папок...">
            <div class="search-buttons">
                <button class="btn btn-search" onclick="performSearch()">🔍 Найти</button>
                <button class="btn btn-reset" onclick="resetToRoot()">🏠 На главную</button>
                <button class="btn btn-up" onclick="goUp()">⬆️ На уровень выше</button>
            </div>
        </div>
        
        <div class="breadcrumb" id="breadcrumb"></div>
        
        <div class="file-tree" id="fileTree">
            <div class="loading-progress">
                <div>⏳ Загрузка данных...</div>
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div id="progressText">Подготовка...</div>
            </div>
        </div>
        
        <div class="footer">
            <div class="badge">⚡ RAW-ссылки для ИИ | Сгенерировано в Termux</div>
            <div>📅 <span id="generationDate"></span></div>
        </div>
    </div>
    
    <script>
const treeData = [
    {"type":"folder","path":"/storage/emulated/0/Documents/01_GitHub_DeepSeekProject"}
]

        let currentPath = '';
        let searchMode = false;
        let treeDataRaw = treeData;
        let folders = new Set();
        let filesByPath = {};
        
        function openFile(url) {
            if (url) {
                window.open(url, '_blank');
            }
        }
        
        function buildIndexes() {
            folders.clear();
            filesByPath = {};
            
            treeDataRaw.forEach(item => {
                if (item.type === 'folder') {
                    folders.add(item.path);
                } else {
                    const dir = item.path.lastIndexOf('/') === -1 ? '' : item.path.substring(0, item.path.lastIndexOf('/'));
                    if (!filesByPath[dir]) filesByPath[dir] = [];
                    filesByPath[dir].push(item);
                }
            });
            
            document.getElementById('folderCount').textContent = folders.size;
            document.getElementById('fileCount').textContent = treeDataRaw.filter(i => i.type === 'file').length;
            document.getElementById('totalSize').textContent = '3.8M';
            document.getElementById('generationDate').textContent = new Date().toLocaleString('ru-RU');
        }
        
        function getFolders(path) {
            const prefix = path ? path + '/' : '';
            const result = [];
            folders.forEach(f => {
                if (f === path) return;
                if (f.startsWith(prefix)) {
                    const r = f.substring(prefix.length);
                    if (r && !r.includes('/')) result.push(r);
                }
            });
            return result.sort();
        }
        
        function render() {
            const container = document.getElementById('fileTree');
            const bread = document.getElementById('breadcrumb');
            const pathDisplay = document.getElementById('currentPath');
            
            if (searchMode) {
                bread.innerHTML = '<a href="#" onclick="resetToRoot();return false;">🏠 Главная</a> › 🔍 Поиск';
                pathDisplay.innerHTML = '🔍 Режим поиска';
                return;
            }
            
            if (currentPath) {
                const parts = currentPath.split('/');
                let html = '<a href="#" onclick="setPath(\'\');return false;">🏠 Главная</a>';
                let cum = '';
                parts.forEach(p => {
                    cum += (cum ? '/' : '') + p;
                    html += ` › <a href="#" onclick="setPath('${cum}');return false;">${p}</a>`;
                });
                bread.innerHTML = html;
                pathDisplay.innerHTML = '📁 ' + currentPath;
            } else {
                bread.innerHTML = '🏠 Главная';
                pathDisplay.innerHTML = '📁 Корень репозитория';
            }
            
            const folderList = getFolders(currentPath);
            const fileList = filesByPath[currentPath] || [];
            
            container.innerHTML = '';
            
            if (currentPath) {
                const upDiv = document.createElement('div');
                upDiv.className = 'tree-item';
                const upCdiv = document.createElement('div');
                upCdiv.className = 'tree-item-content';
                upCdiv.innerHTML = '<span class="folder-icon">⬆️</span> .. (на уровень выше)';
                upCdiv.onclick = () => goUp();
                upDiv.appendChild(upCdiv);
                container.appendChild(upDiv);
            }
            
            folderList.forEach(f => {
                const div = document.createElement('div');
                div.className = 'tree-item';
                const cdiv = document.createElement('div');
                cdiv.className = 'tree-item-content';
                cdiv.innerHTML = '<span class="folder-icon">📁</span> ' + f;
                cdiv.onclick = () => setPath(currentPath ? currentPath + '/' + f : f);
                div.appendChild(cdiv);
                container.appendChild(div);
            });
            
            fileList.sort((a,b) => a.path.localeCompare(b.path)).forEach(file => {
                const name = file.path.split('/').pop();
                const div = document.createElement('div');
                div.className = 'tree-item';
                const cdiv = document.createElement('div');
                cdiv.className = 'tree-item-content';
                cdiv.innerHTML = `<span class="${file.class || 'file-icon'}">${file.icon || '📄'}</span> ${name} <span class="file-size">[${file.size}]</span>`;
                cdiv.onclick = () => openFile(file.url);
                div.appendChild(cdiv);
                container.appendChild(div);
            });
            
            if (!folderList.length && !fileList.length && !currentPath) {
                container.innerHTML = '<div class="no-results">📂 Нет файлов для отображения</div>';
            } else if (!folderList.length && !fileList.length) {
                container.innerHTML = '<div class="no-results">📂 Папка пуста</div>';
            }
        }
        
        function setPath(p) {
            currentPath = p;
            searchMode = false;
            document.getElementById('searchInput').value = '';
            render();
        }
        
        function goUp() {
            if (!currentPath) return;
            const parts = currentPath.split('/');
            parts.pop();
            setPath(parts.join('/'));
        }
        
        function resetToRoot() {
            setPath('');
        }
        
        function performSearch() {
            const term = document.getElementById('searchInput').value.toLowerCase().trim();
            if (!term) { resetToRoot(); return; }
            searchMode = true;
            const results = treeDataRaw.filter(i => i.path.toLowerCase().includes(term));
            const container = document.getElementById('fileTree');
            container.innerHTML = '';
            
            if (!results.length) {
                container.innerHTML = '<div class="no-results">🔍 Ничего не найдено по запросу "' + term + '"</div>';
                return;
            }
            
            results.sort((a,b) => a.path.localeCompare(b.path)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'tree-item';
                const cdiv = document.createElement('div');
                cdiv.className = 'tree-item-content';
                let icon = item.type === 'folder' ? '📁' : (item.icon || '📄');
                cdiv.innerHTML = `<span>${icon}</span> ${item.path} <span class="file-size">[${item.size || 'папка'}]</span>`;
                
                if (item.type === 'folder') {
                    cdiv.onclick = () => setPath(item.path);
                } else {
                    cdiv.onclick = () => openFile(item.url);
                }
                div.appendChild(cdiv);
                container.appendChild(div);
            });
            
            document.getElementById('breadcrumb').innerHTML = '<a href="#" onclick="resetToRoot();return false;">🏠 Главная</a> › 🔍 Результатов: ' + results.length;
        }
        
        function init() {
            buildIndexes();
            const pb = document.getElementById('progressFill');
            const pt = document.getElementById('progressText');
            let p = 0;
            const iv = setInterval(() => {
                p += 5;
                pb.style.width = p + '%';
                pt.textContent = 'Загрузка ' + p + '%';
                if (p >= 100) {
                    clearInterval(iv);
                    document.querySelector('.loading-progress').style.display = 'none';
                    render();
                }
            }, 20);
        }
        
        document.addEventListener('DOMContentLoaded', init);
        document.getElementById('searchInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') performSearch();
        });
    </script>
</body>
</html>
