<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAVI - Интерактивный навигатор DeepSeek</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;padding:20px;color:#fff;}
        .container{max-width:1400px;margin:0 auto;background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:30px;padding:30px;border:1px solid rgba(255,255,255,0.1);}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:30px;flex-wrap:wrap;gap:20px;}
        .title h1{font-size:2.5em;background:linear-gradient(135deg,#fff 0%,#a8dadc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
        .stats{display:flex;gap:20px;}
        .stat{background:rgba(255,255,255,0.1);padding:15px 25px;border-radius:20px;text-align:center;}
        .stat-value{font-size:2em;font-weight:bold;color:#4cc9f0;}
        .search-section{margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;}
        .search-box{flex:1;padding:15px 20px;background:rgba(255,255,255,0.1);border:2px solid rgba(255,255,255,0.2);border-radius:15px;color:white;font-size:1.1em;}
        .search-box:focus{outline:none;border-color:#4cc9f0;}
        .btn{padding:15px 30px;border:none;border-radius:15px;font-size:1em;font-weight:bold;cursor:pointer;color:white;}
        .btn-search{background:linear-gradient(135deg,#4cc9f0 0%,#4895ef 100%);}
        .btn-reset{background:linear-gradient(135deg,#ff6b6b 0%,#ff8e8e 100%);}
        .file-tree{background:rgba(0,0,0,0.3);border-radius:20px;padding:20px;max-height:600px;overflow-y:auto;font-family:monospace;font-size:14px;}
        .tree-item{margin:2px 0;cursor:pointer;}
        .tree-item-content{display:flex;align-items:center;padding:8px 10px;border-radius:8px;transition:all 0.2s;}
        .tree-item-content:hover{background:rgba(76,201,240,0.2);}
        .folder-icon{color:#ffd166;margin-right:8px;}
        .file-icon{color:#4cc9f0;margin-right:8px;}
        .file-size{color:rgba(255,255,255,0.5);font-size:0.9em;margin-left:10px;}
        .breadcrumb{margin-bottom:20px;padding:10px;background:rgba(0,0,0,0.2);border-radius:10px;}
        .breadcrumb a{color:#4cc9f0;text-decoration:none;cursor:pointer;}
        .no-results{text-align:center;padding:50px;color:rgba(255,255,255,0.5);}
        .footer{margin-top:30px;text-align:center;color:rgba(255,255,255,0.5);display:flex;justify-content:space-between;flex-wrap:wrap;gap:20px;}
        .badge{background:rgba(76,201,240,0.2);padding:8px 15px;border-radius:20px;border:1px solid #4cc9f0;color:#4cc9f0;}
        .loading{text-align:center;padding:50px;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title"><h1>🧭 NAVI</h1><div>📂 DeepSeek Project</div></div>
            <div class="stats">
                <div class="stat"><div class="stat-value" id="folderCount">0</div><div>Папок</div></div>
                <div class="stat"><div class="stat-value" id="fileCount">0</div><div>Файлов</div></div>
                <div class="stat"><div class="stat-value" id="totalSize">1.1G</div><div>Размер</div></div>
            </div>
        </div>
        <div class="search-section">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Поиск...">
            <button class="btn btn-search" onclick="performSearch()">🔍 Найти</button>
            <button class="btn btn-reset" onclick="resetToRoot()">🏠 На главную</button>
        </div>
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="file-tree" id="fileTree"><div class="loading">⏳ Загрузка данных...</div></div>
        <div class="footer"><div class="badge">⚡ Сгенерировано Termux</div><div id="generationDate"></div></div>
    </div>
    <script>
        // ВСТРОЕННЫЕ ДАННЫЕ (вставляются ниже)
        let treeData = __JSON_DATA_PLACEHOLDER__;
        let currentPath = "";
        let searchMode = false;
        let folders = new Set();
        let filesByPath = {};
        
        function getFileExt(n){let p=n.split(".");return p.length>1?p.pop().toLowerCase():"";}
        
        function openFile(u,n){
            if(!u)return;
            let e=getFileExt(n);
            let d=["docx","doc","xlsx","pptx","pdf","zip","rar","7z","apk","jpg","jpeg","png","gif"];
            if(e==="html"||e==="htm"){window.open(u,"_blank");}
            else if(d.includes(e)){window.open(u.replace("/blob/","/raw/"),"_blank");}
            else{window.open(u,"_blank");}
        }
        
        function build(){
            folders.clear();
            filesByPath={};
            treeData.forEach(i=>{
                if(i.type==="folder")folders.add(i.path);
                else{
                    let d=i.path.lastIndexOf("/")===-1?"":i.path.substring(0,i.path.lastIndexOf("/"));
                    if(!filesByPath[d])filesByPath[d]=[];
                    filesByPath[d].push(i);
                }
            });
            document.getElementById("folderCount").innerHTML=folders.size;
            document.getElementById("fileCount").innerHTML=treeData.filter(i=>i.type==="file").length;
            document.getElementById("totalSize").innerHTML="$SIZE";
            document.getElementById("generationDate").innerHTML="📅 "+new Date().toLocaleString();
        }
        
        function getFolders(p){
            let pre=p?p+"/":"";
            let res=new Set();
            folders.forEach(f=>{
                if(f.startsWith(pre)){
                    let r=f.substring(pre.length);
                    if(r&&!r.includes("/"))res.add(r);
                }
            });
            return Array.from(res).sort();
        }
        
        function render(){
            let c=document.getElementById("fileTree"),b=document.getElementById("breadcrumb");
            if(searchMode){
                b.innerHTML='<a href="#" onclick="resetToRoot();return false;">🏠 Главная</a> › 🔍 Поиск';
                return;
            }
            if(currentPath){
                let p=currentPath.split("/");
                let h='<a href="#" onclick="setPath(\'\');return false;">🏠 Главная</a>';
                let cum="";
                p.forEach(pp=>{
                    cum+=(cum?"/":"")+pp;
                    h+=` › <a href="#" onclick="setPath('${cum}');return false;">${pp}</a>`;
                });
                b.innerHTML=h;
            }else{b.innerHTML="🏠 Главная";}
            
            let fl=getFolders(currentPath);
            let fl2=filesByPath[currentPath]||[];
            c.innerHTML="";
            
            fl.forEach(f=>{
                let d=document.createElement("div");d.className="tree-item";
                let cd=document.createElement("div");cd.className="tree-item-content";
                cd.innerHTML='<span class="folder-icon">📁</span> '+f;
                cd.onclick=()=>setPath(currentPath?currentPath+"/"+f:f);
                d.appendChild(cd);c.appendChild(d);
            });
            
            fl2.sort((a,b)=>a.path.localeCompare(b.path)).forEach(f=>{
                let n=f.path.split("/").pop(),e=getFileExt(n),ic="📄";
                if(e==="md")ic="📝";
                else if(e==="html")ic="🌐";
                else if(e==="sh")ic="⚙️";
                else if(e==="docx")ic="📘";
                let d=document.createElement("div");d.className="tree-item";
                let cd=document.createElement("div");cd.className="tree-item-content";
                cd.innerHTML=`<span class="file-icon">${ic}</span> ${n} <span class="file-size">[${f.size}]</span>`;
                cd.onclick=()=>openFile(f.url,n);
                d.appendChild(cd);c.appendChild(d);
            });
            if(!fl.length&&!fl2.length)c.innerHTML='<div class="no-results">📂 Пусто</div>';
        }
        
        function setPath(p){currentPath=p;searchMode=false;document.getElementById("searchInput").value="";render();history.pushState({path:p},"");}
        function resetToRoot(){setPath("");}
        
        function performSearch(){
            let t=document.getElementById("searchInput").value.toLowerCase().trim();
            if(!t){resetToRoot();return;}
            searchMode=true;
            let r=treeData.filter(i=>i.path.toLowerCase().includes(t));
            let c=document.getElementById("fileTree");
            c.innerHTML="";
            if(!r.length){c.innerHTML='<div class="no-results">🔍 Ничего не найдено</div>';return;}
            r.forEach(i=>{
                let d=document.createElement("div");d.className="tree-item";
                let cd=document.createElement("div");cd.className="tree-item-content";
                let ic=i.type==="folder"?"📁":"📄";
                cd.innerHTML=`<span>${ic}</span> ${i.path}`;
                if(i.type==="folder"){cd.onclick=()=>setPath(i.path);}
                else{let n=i.path.split("/").pop();cd.onclick=()=>openFile(i.url,n);}
                d.appendChild(cd);c.appendChild(d);
            });
            document.getElementById("breadcrumb").innerHTML='<a href="#" onclick="resetToRoot();return false;">🏠 Главная</a> › 🔍 Результатов: '+r.length;
        }
        
        window.onpopstate=e=>{if(e.state?.path!==undefined){currentPath=e.state.path;searchMode=false;render();}};
        
        function init(){
            build();
            render();
            history.replaceState({path:""},"");
        }
        
        document.addEventListener("DOMContentLoaded",init);
        document.getElementById("searchInput").addEventListener("keypress",e=>{if(e.key==="Enter")performSearch();});
    </script>
